<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Mind - Tournament OS (Cloud Sync & Image Optimized)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 6 untuk Ikon Bebas Crash -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fcfcfc; 
        }
        .custom-scrollbar::-webkit-scrollbar { 
            width: 5px; 
            height: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track { 
            background: transparent; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: #4c0519; 
            border-radius: 10px; 
        }
        .active-nav { 
            background: linear-gradient(135deg, #ef4444, #991b1b); 
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.25); 
        }
        /* Animasi Pop Up */
        .animate-pop {
            animation: popCheck 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes popCheck {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .sync-pulse {
            animation: pulse-ring 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }
    </style>
</head>
<body class="text-slate-800 antialiased">
    <div id="root"></div>

    <!-- React 18 & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        // Fungsi cerdas untuk mengecilkan dimensi dan kompresi gambar JPEG di frontend
        const compressAndResizeImage = (file, maxWidth, maxHeight, quality = 0.65) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        // Pertahankan rasio aspek gambar saat melakukan resizing
                        if (width > height) {
                            if (width > maxWidth) {
                                height = Math.round((height * maxWidth) / width);
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = Math.round((width * maxHeight) / height);
                                height = maxHeight;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Ekspor sebagai JPEG berukuran mikro untuk efisiensi transfer data Google Sheets
                        const compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                        resolve(compressedBase64);
                    };
                    img.onerror = (err) => reject(err);
                };
                reader.onerror = (err) => reject(err);
            });
        };

        const Icon = ({ name, className = "", size }) => {
            const style = size ? { fontSize: `${size}px` } : {};
            return <i className={`${name} ${className}`} style={style}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = React.useState('dashboard');
            const [isSidebarOpen, setIsSidebarOpen] = React.useState(false);

            // Sesi Pengguna saat ini (Login State)
            const [currentUser, setCurrentUser] = React.useState(() => {
                try {
                    const saved = localStorage.getItem('jm_current_user');
                    return saved ? JSON.parse(saved) : null;
                } catch(e) { return null; }
            });

            // Basis data Admin tambahan yang dikelola oleh Owner
            const [admins, setAdmins] = React.useState(() => {
                try {
                    const saved = localStorage.getItem('jm_admins');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });

            // Database internal dengan fitur auto-load dari localStorage
            const [leagues, setLeagues] = React.useState(() => {
                try {
                    const saved = localStorage.getItem('jm_leagues');
                    return saved ? JSON.parse(saved) : [
                        { 
                            id: 'l1', 
                            name: 'Liga Utama Just Mind', 
                            type: 'league', 
                            groups: ['Grup A', 'Grup B'], 
                            points: { win: 3, draw: 1, loss: 0, winPk: 2, lossPk: 1 },
                            logo: null
                        }
                    ];
                } catch(e) {
                    return [{ id: 'l1', name: 'Liga Utama Just Mind', type: 'league', groups: ['Grup A', 'Grup B'], points: { win: 3, draw: 1, loss: 0, winPk: 2, lossPk: 1 }, logo: null }];
                }
            });

            const [currentLeagueId, setCurrentLeagueId] = React.useState(() => {
                try {
                    const saved = localStorage.getItem('jm_current_league_id');
                    return saved || 'l1';
                } catch(e) { return 'l1'; }
            });

            const [teams, setTeams] = React.useState(() => {
                try {
                    const saved = localStorage.getItem('jm_teams');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });

            const [players, setPlayers] = React.useState(() => {
                try {
                    const saved = localStorage.getItem('jm_players');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });

            const [matches, setMatches] = React.useState(() => {
                try {
                    const saved = localStorage.getItem('jm_matches');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });

            const [gasUrl, setGasUrl] = React.useState(() => {
                return localStorage.getItem('jm_gas_url') || '';
            });
            const [syncStatus, setSyncStatus] = React.useState('local'); // 'local' | 'connecting' | 'synced' | 'error'
            const [isSyncing, setIsSyncing] = React.useState(false);

            // State untuk modal kustom
            const [confirmModal, setConfirmModal] = React.useState({ isOpen: false, title: '', message: '', onConfirm: null });
            const [alertModal, setAlertModal] = React.useState({ isOpen: false, title: '', message: '', type: 'info' });

            // Sinkronisasi data ke LocalStorage secara otomatis saat terjadi perubahan
            React.useEffect(() => {
                try { localStorage.setItem('jm_current_user', JSON.stringify(currentUser)); } catch(e){}
            }, [currentUser]);

            React.useEffect(() => {
                try { localStorage.setItem('jm_admins', JSON.stringify(admins)); } catch(e){}
            }, [admins]);

            React.useEffect(() => {
                try { localStorage.setItem('jm_leagues', JSON.stringify(leagues)); } catch(e){}
            }, [leagues]);

            React.useEffect(() => {
                try { localStorage.setItem('jm_current_league_id', currentLeagueId); } catch(e){}
            }, [currentLeagueId]);

            React.useEffect(() => {
                try { localStorage.setItem('jm_teams', JSON.stringify(teams)); } catch(e){}
            }, [teams]);

            React.useEffect(() => {
                try { localStorage.setItem('jm_players', JSON.stringify(players)); } catch(e){}
            }, [players]);

            React.useEffect(() => {
                try { localStorage.setItem('jm_matches', JSON.stringify(matches)); } catch(e){}
            }, [matches]);

            React.useEffect(() => {
                localStorage.setItem('jm_gas_url', gasUrl);
            }, [gasUrl]);

            const pullFromCloud = React.useCallback(async (quiet = false) => {
                if (!gasUrl) {
                    setSyncStatus('local');
                    return;
                }
                if (!quiet) setIsSyncing(true);
                setSyncStatus('connecting');

                try {
                    const response = await fetch(gasUrl, { method: 'GET', redirect: 'follow' });
                    if (!response.ok) throw new Error("HTTP error " + response.status);
                    const cloudData = await response.json();

                    if (cloudData) {
                        if (cloudData.leagues) setLeagues(cloudData.leagues);
                        if (cloudData.admins) setAdmins(cloudData.admins);
                        if (cloudData.teams) setTeams(cloudData.teams);
                        if (cloudData.players) setPlayers(cloudData.players);
                        if (cloudData.matches) setMatches(cloudData.matches);
                        setSyncStatus('synced');
                    }
                } catch (error) {
                    console.error("Gagal sinkronisasi awan:", error);
                    setSyncStatus('error');
                    if (!quiet) showAlert('Koneksi Gagal', 'Gagal memuat data awan. Kembali menggunakan basis data lokal.', 'error');
                } finally {
                    setIsSyncing(false);
                }
            }, [gasUrl]);

            const pushToCloud = React.useCallback(async (customState = null) => {
                if (!gasUrl) return;
                setIsSyncing(true);
                setSyncStatus('connecting');

                const payload = {
                    action: 'sync',
                    leagues: customState?.leagues || leagues,
                    admins: customState?.admins || admins,
                    teams: customState?.teams || teams,
                    players: customState?.players || players,
                    matches: customState?.matches || matches
                };

                try {
                    await fetch(gasUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("Gagal mengunggah data awan:", error);
                    setSyncStatus('error');
                    showAlert('Gagal Menyimpan', 'Perubahan tersimpan secara lokal namun gagal diperbarui ke awan.', 'error');
                } finally {
                    setIsSyncing(false);
                }
            }, [gasUrl, leagues, admins, teams, players, matches]);

            // Auto-pull pada muat awal aplikasi
            React.useEffect(() => {
                if (gasUrl) {
                    pullFromCloud(true);
                }
            }, [gasUrl, pullFromCloud]);

            const currentLeague = React.useMemo(() => {
                return leagues.find(l => l.id === currentLeagueId) || leagues[0];
            }, [leagues, currentLeagueId]);

            const filteredTeams = React.useMemo(() => {
                return teams.filter(t => t.leagueId === currentLeagueId);
            }, [teams, currentLeagueId]);

            const filteredMatches = React.useMemo(() => {
                return matches.filter(m => m.leagueId === currentLeagueId);
            }, [matches, currentLeagueId]);

            const filteredPlayers = React.useMemo(() => {
                return players.filter(p => filteredTeams.some(t => t.id === p.teamId));
            }, [players, filteredTeams]);

            const standingsByGroup = React.useMemo(() => {
                if (!currentLeague || currentLeague.type !== 'league') return {};
                const pRules = currentLeague.points || { win: 3, draw: 1, loss: 0, winPk: 2, lossPk: 1 };
                const groups = currentLeague.groups || ['Grup A'];
                let grouped = {};

                groups.forEach(g => {
                    grouped[g] = filteredTeams.filter(t => t.groupName === g).map(t => ({
                        ...t, played: 0, win: 0, draw: 0, loss: 0, gf: 0, ga: 0, pts: 0, winPk: 0, lossPk: 0
                    }));
                });

                filteredMatches.filter(m => m.isFinished).forEach(m => {
                    const home = Object.values(grouped).flat().find(t => t.id === m.homeId);
                    const away = Object.values(grouped).flat().find(t => t.id === m.awayId);
                    if (home && away) {
                        const sh = Number(m.scoreHome) || 0;
                        const sa = Number(m.scoreAway) || 0;
                        home.played++; away.played++;
                        home.gf += sh; home.ga += sa;
                        away.gf += sa; away.ga += sh;

                        if (sh > sa) {
                            home.win++;
                            home.pts += Number(pRules.win);
                            away.loss++;
                            away.pts += Number(pRules.loss);
                        } else if (sa > sh) {
                            away.win++;
                            away.pts += Number(pRules.win);
                            home.loss++;
                            home.pts += Number(pRules.loss);
                        } else {
                            if (m.isPk) {
                                const pkh = Number(m.pkHome) || 0;
                                const pka = Number(m.pkAway) || 0;
                                if (pkh > pka) {
                                    home.winPk++;
                                    home.pts += Number(pRules.winPk);
                                    away.lossPk++;
                                    away.pts += Number(pRules.lossPk);
                                } else {
                                    away.winPk++;
                                    away.pts += Number(pRules.winPk);
                                    home.lossPk++;
                                    home.pts += Number(pRules.lossPk);
                                }
                            } else {
                                home.draw++;
                                away.draw++;
                                home.pts += Number(pRules.draw);
                                away.pts += Number(pRules.draw);
                            }
                        }
                    }
                });

                Object.keys(grouped).forEach(k => {
                    grouped[k].sort((a, b) => b.pts - a.pts || (b.gf - b.ga) - (a.gf - a.ga) || b.gf - a.gf);
                });
                return grouped;
            }, [filteredMatches, filteredTeams, currentLeague]);

            const topScorersList = React.useMemo(() => {
                let counts = {};
                filteredMatches.forEach(m => {
                    if (m.scorers) {
                        m.scorers.forEach(s => {
                            counts[s.playerId] = (counts[s.playerId] || 0) + 1;
                        });
                    }
                });
                return Object.entries(counts)
                    .map(([pid, goals]) => {
                        const pInfo = players.find(p => p.id === pid);
                        if (!pInfo) return null;
                        const tInfo = teams.find(t => t.id === pInfo.teamId);
                        return { ...pInfo, goals, teamName: tInfo ? tInfo.name : 'Klub tidak diketahui' };
                    })
                    .filter(p => p !== null)
                    .sort((a, b) => b.goals - a.goals)
                    .slice(0, 5);
            }, [filteredMatches, players, teams]);

            const showConfirm = (title, message, onConfirm) => {
                setConfirmModal({ isOpen: true, title, message, onConfirm });
            };

            const showAlert = (title, message, type = 'info') => {
                setAlertModal({ isOpen: true, title, message, type });
            };

            const hasWriteAuthority = React.useMemo(() => {
                return currentUser !== null && (currentUser.role === 'admin' || currentUser.role === 'owner');
            }, [currentUser]);

            return (
                <div className="min-h-screen flex text-slate-800 bg-[#fcfcfc] overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className={`fixed top-0 left-0 h-full bg-[#4c0519] text-white z-50 transition-all duration-300 ease-in-out ${isSidebarOpen ? 'w-72' : 'w-0 -left-72'} lg:w-72 lg:left-0 shadow-2xl overflow-hidden flex flex-col`}>
                        <div className="p-6 border-b border-white/5 text-center">
                            <div className="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-lg mx-auto mb-3">
                                <Icon name="fa-solid fa-trophy" className="text-[#4c0519] text-2xl" />
                            </div>
                            <span className="font-extrabold text-2xl tracking-tighter block uppercase">JUST<span className="text-red-500">MIND</span></span>
                            <span className="text-[9px] text-red-200/40 font-bold uppercase tracking-[0.2em]">Tournament OS</span>
                        </div>
                        <nav className="flex-1 p-4 space-y-1 overflow-y-auto custom-scrollbar">
                            {[
                                { id: 'dashboard', label: 'Dashboard', icon: 'fa-solid fa-chart-line' },
                            ].map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => { setActiveTab(item.id); if (window.innerWidth < 1024) setIsSidebarOpen(false); }}
                                    className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all group relative ${activeTab === item.id ? 'active-nav' : 'hover:bg-white/5 text-red-200/60 hover:text-white'}`}
                                >
                                    <Icon name={item.icon} className={activeTab === item.id ? 'text-white' : 'text-red-300/30'} size={16} />
                                    <span className="font-bold text-sm">{item.label}</span>
                                    {activeTab === item.id && <div className="absolute right-4 w-1.5 h-1.5 bg-white rounded-full" />}
                                </button>
                            ))}

                            {hasWriteAuthority && [
                                { id: 'leagues', label: 'Manajemen Liga', icon: 'fa-solid fa-layer-group' },
                                { id: 'admin', label: 'Tim & Skuad', icon: 'fa-solid fa-shield-halved' },
                            ].map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => { setActiveTab(item.id); if (window.innerWidth < 1024) setIsSidebarOpen(false); }}
                                    className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all group relative ${activeTab === item.id ? 'active-nav' : 'hover:bg-white/5 text-red-200/60 hover:text-white'}`}
                                >
                                    <Icon name={item.icon} className={activeTab === item.id ? 'text-white' : 'text-red-300/30'} size={16} />
                                    <span className="font-bold text-sm">{item.label}</span>
                                    {activeTab === item.id && <div className="absolute right-4 w-1.5 h-1.5 bg-white rounded-full" />}
                                </button>
                            ))}

                            {[
                                { id: 'jadwal', label: 'Jadwal & Hasil', icon: 'fa-solid fa-calendar-days' },
                                { id: 'klasemen', label: 'Peringkat / Bracket', icon: 'fa-solid fa-list-ol' },
                            ].map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => { setActiveTab(item.id); if (window.innerWidth < 1024) setIsSidebarOpen(false); }}
                                    className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all group relative ${activeTab === item.id ? 'active-nav' : 'hover:bg-white/5 text-red-200/60 hover:text-white'}`}
                                >
                                    <Icon name={item.icon} className={activeTab === item.id ? 'text-white' : 'text-red-300/30'} size={16} />
                                    <span className="font-bold text-sm">{item.label}</span>
                                    {activeTab === item.id && <div className="absolute right-4 w-1.5 h-1.5 bg-white rounded-full" />}
                                </button>
                            ))}

                            {/* Menu Pengaturan Integrasi Google Sheet */}
                            <button
                                onClick={() => { setActiveTab('gs_sync'); if (window.innerWidth < 1024) setIsSidebarOpen(false); }}
                                className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all group relative ${activeTab === 'gs_sync' ? 'active-nav' : 'hover:bg-white/5 text-red-200/60 hover:text-white'}`}
                            >
                                <Icon name="fa-solid fa-cloud-arrow-up" className={activeTab === 'gs_sync' ? 'text-white' : 'text-red-300/30'} size={16} />
                                <span className="font-bold text-sm">Google Sheets</span>
                                {activeTab === 'gs_sync' && <div className="absolute right-4 w-1.5 h-1.5 bg-white rounded-full" />}
                            </button>

                            {currentUser?.role === 'owner' && (
                                <button
                                    onClick={() => { setActiveTab('manage_admins'); if (window.innerWidth < 1024) setIsSidebarOpen(false); }}
                                    className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all group relative ${activeTab === 'manage_admins' ? 'active-nav' : 'hover:bg-white/5 text-red-200/60 hover:text-white'}`}
                                >
                                    <Icon name="fa-solid fa-users-gear" className={activeTab === 'manage_admins' ? 'text-white' : 'text-red-300/30'} size={16} />
                                    <span className="font-bold text-sm">Kelola Admin</span>
                                    {activeTab === 'manage_admins' && <div className="absolute right-4 w-1.5 h-1.5 bg-white rounded-full" />}
                                </button>
                            )}

                            <button
                                onClick={() => { setActiveTab('auth'); if (window.innerWidth < 1024) setIsSidebarOpen(false); }}
                                className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all group relative ${activeTab === 'auth' ? 'active-nav' : 'hover:bg-white/5 text-red-200/60 hover:text-white'}`}
                            >
                                <Icon name="fa-solid fa-lock" className={activeTab === 'auth' ? 'text-white' : 'text-red-300/30'} size={16} />
                                <span className="font-bold text-sm">{currentUser ? 'Pengaturan Akun' : 'Masuk (Login)'}</span>
                                {activeTab === 'auth' && <div className="absolute right-4 w-1.5 h-1.5 bg-white rounded-full" />}
                            </button>
                        </nav>
                        <div className="p-4 border-t border-white/5 text-[9px] text-center text-red-200/20 font-bold uppercase tracking-widest">v6.5 - Google Sheet & Image Optimized</div>
                    </aside>

                    {isSidebarOpen && (
                        <div className="fixed inset-0 bg-black/60 z-40 lg:hidden backdrop-blur-sm" onClick={() => setIsSidebarOpen(false)} />
                    )}

                    {/* MAIN CONTENT AREA */}
                    <div className="flex-1 flex flex-col h-screen overflow-hidden lg:ml-72">
                        {/* HEADER */}
                        <header className="h-16 bg-white border-b border-slate-100 flex items-center justify-between px-6 sticky top-0 z-30">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsSidebarOpen(true)} className="lg:hidden p-2 text-slate-400 hover:bg-slate-50 rounded-xl">
                                    <Icon name="fa-solid fa-bars" size={18} />
                                </button>
                                <div className="flex flex-col">
                                    <span className="text-[9px] font-black text-red-600 uppercase tracking-widest leading-none">Liga Aktif</span>
                                    <select 
                                        value={currentLeagueId}
                                        onChange={(e) => setCurrentLeagueId(e.target.value)}
                                        className="bg-transparent border-none p-0 font-bold text-slate-800 focus:ring-0 cursor-pointer text-xs uppercase tracking-wide mt-1 outline-none"
                                    >
                                        {leagues.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
                                    </select>
                                </div>
                            </div>
                            
                            {/* Status Sinkronisasi Awan di Header */}
                            <div className="flex items-center gap-3">
                                {gasUrl && (
                                    <div className="flex items-center gap-2 bg-slate-50 border border-slate-100 px-3 py-1.5 rounded-full text-[10px] font-bold">
                                        {syncStatus === 'synced' && (
                                            <>
                                                <span className="w-2.5 h-2.5 rounded-full bg-emerald-500 inline-block animate-pulse"></span>
                                                <span className="text-emerald-700 font-extrabold uppercase tracking-wide">Terhubung Sheet</span>
                                            </>
                                        )}
                                        {syncStatus === 'connecting' && (
                                            <>
                                                <span className="w-2.5 h-2.5 rounded-full bg-amber-500 inline-block sync-pulse"></span>
                                                <span className="text-amber-700 font-extrabold uppercase tracking-wide">Sinkronisasi...</span>
                                            </>
                                        )}
                                        {syncStatus === 'error' && (
                                            <>
                                                <span className="w-2.5 h-2.5 rounded-full bg-rose-500 inline-block"></span>
                                                <span className="text-rose-700 font-extrabold uppercase tracking-wide">Mode Offline</span>
                                            </>
                                        )}
                                    </div>
                                )}
                                
                                {currentUser ? (
                                    <div className="flex items-center gap-2">
                                        <div className="hidden md:flex flex-col text-right">
                                            <span className="text-[10px] font-black uppercase text-[#4c0519] leading-none">{currentUser.name}</span>
                                            <span className="text-[8px] text-slate-400 font-semibold uppercase mt-0.5">{currentUser.role === 'owner' ? 'Owner' : 'Admin'}</span>
                                        </div>
                                        <div className="w-9 h-9 rounded-xl bg-[#4c0519] text-white flex items-center justify-center shadow-md">
                                            <Icon name={currentUser.role === 'owner' ? 'fa-solid fa-crown' : 'fa-solid fa-user-shield'} size={14} />
                                        </div>
                                    </div>
                                ) : (
                                    <button onClick={() => setActiveTab('auth')} className="text-[10px] font-extrabold uppercase tracking-widest bg-slate-100 hover:bg-slate-200 text-[#4c0519] px-4 py-2 rounded-xl transition-all">
                                        <Icon name="fa-solid fa-right-to-bracket mr-1.5" /> Masuk Admin
                                    </button>
